  <text x="48" y="122" font-size="17" fill="#111827" text-anchor="start" font-weight="800">Storage</text><text x="48" y="164" font-size="13" fill="#111827" text-anchor="start" font-weight="700">ZoneTree</text><rect x="180" y="150" width="520" height="20" rx="10" fill="#f3f4f6"/><rect x="180" y="150" width="105.56" height="20" rx="10" fill="#16a34a"/><text x="728" y="164" font-size="12" fill="#374151" text-anchor="start" font-weight="700">36.9 MB</text><text x="48" y="195" font-size="13" fill="#111827" text-anchor="start" font-weight="700">SQLite</text><rect x="180" y="181" width="520" height="20" rx="10" fill="#f3f4f6"/><rect x="180" y="181" width="406.46" height="20" rx="10" fill="#dc2626"/><text x="728" y="195" font-size="12" fill="#374151" text-anchor="start" font-weight="700">142.2 MB</text><text x="48" y="226" font-size="13" fill="#111827" text-anchor="start" font-weight="700">MySQL</text><rect x="180" y="212" width="520" height="20" rx="10" fill="#f3f4f6"/><rect x="180" y="212" width="444.29" height="20" rx="10" fill="#2563eb"/><text x="728" y="226" font-size="12" fill="#374151" text-anchor="start" font-weight="700">155.4 MB</text><text x="48" y="257" font-size="13" fill="#111827" text-anchor="start" font-weight="700">RocksDB</text><rect x="180" y="243" width="520" height="20" rx="10" fill="#f3f4f6"/><rect x="180" y="243" width="520" height="20" rx="10" fill="#7c3aed"/><text x="728" y="257" font-size="12" fill="#374151" text-anchor="start" font-weight="700">181.9 MB</text><text x="48" y="292" font-size="17" fill="#111827" text-anchor="start" font-weight="800">Process peak memory</text><text x="48" y="334" font-size="13" fill="#111827" text-anchor="start" font-weight="700">MySQL</text><rect x="180" y="320" width="520" height="20" rx="10" fill="#f3f4f6"/><rect x="180" y="320" width="47.65" height="20" rx="10" fill="#2563eb"/><text x="728" y="334" font-size="12" fill="#374151" text-anchor="start" font-weight="700">103.0 MB</text><text x="48" y="365" font-size="13