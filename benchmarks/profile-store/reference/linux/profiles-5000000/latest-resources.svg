<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="462" viewBox="0 0 1360 462" role="img" aria-label="Resource Footprint">
  <style>
    text { font-family: Inter, Segoe UI, Arial, sans-serif; }
  </style>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="48" y="44" font-size="24" font-weight="800" fill="#111827">Resource Footprint</text><text x="48" y="72" font-size="13" fill="#6b7280">Lower is better for both dimensions</text>
  <text x="48" y="122" font-size="17" fill="#111827" text-anchor="start" font-weight="800">Storage</text><text x="48" y="164" font-size="13" fill="#111827" text-anchor="start" font-weight="700">ZoneTree</text><rect x="180" y="150" width="520" height="20" rx="10" fill="#f3f4f6"/><rect x="180" y="150" width="123.5" height="20" rx="10" fill="#16a34a"/><text x="728" y="164" font-size="12" fill="#374151" text-anchor="start" font-weight="700">367.0 MB</text><text x="48" y="195" font-size="13" fill="#111827" text-anchor="start" font-weight="700">RocksDB</text><rect x="180" y="181" width="520" height="20" rx="10" fill="#f3f4f6"/><rect x="180" y="181" width="520" height="20" rx="10" fill="#7c3aed"/><text x="728" y="195" font-size="12" fill="#374151" text-anchor="start" font-weight="700">1.5 GB</text><text x="48" y="292" font-size="17" fill="#111827" text-anchor="start" font-weight="800">Process peak memory</text><text x="48" y="334" font-size="13" fill="#111827" text-anchor="start" font-weight="700">RocksDB</text><rect x="180" y="320" width="520" height="20" rx="10" fill="#f3f4f6"/><rect x="180" y="320" width="178.06" height="20" rx="10" fill="#7c3aed"/><text x="728" y="334" font-size="12" fill="#374151" text-anchor="start" font-weight="700">2.2 GB</text><text x="48" y="365" font-size="13" fill="#111827" text-anchor="start" font-weight="700">ZoneTree</text><rect x="180" y="351" width="520" height="20" rx="10" fill="#f3f4f6"/><rect x="180" y="351" width="520" height="20" rx="10" fill="#16a34a"/><text x="728" y="365" font-size="12" fill="#374151" text-anchor="start" font-weight="700">6.4 GB</text><text x="980" y="122" font-size="12" fill="#6b7280" text-anchor="start" font-weight="700">Measurement scope</text><text x="980" y="150" font-size="13" fill="#374151" text-anchor="start" font-weight="400">MySQL memory is the .NET client only.</text><text x="980" y="174" font-size="13" fill="#374151" text-anchor="start" font-weight="400">Embedded engines include native memory.</text><text x="980" y="198" font-size="13" fill="#374151" text-anchor="start" font-weight="400">Storage is measured after settle/checkpoint.</text>
