" y="255" width="540" height="22" rx="11" fill="#eef2f7"/><rect x="338" y="255" width="15.06" height="22" rx="11" fill="#dc2626"/><text x="930" y="271" font-size="13" fill="#374151" text-anchor="start" font-weight="800">35.9x</text><text x="1060" y="271" font-size="14" fill="#111827" text-anchor="start" font-weight="700">189_133 ms</text><text x="1210" y="271" font-size="14" fill="#4b5563" text-anchor="start" font-weight="400">189_697 ms</text><text x="338" y="356" font-size="12" fill="#6b7280" text-anchor="start" font-weight="400">Relative throughput is normalized to the fastest completed engine. Time columns remain absolute.</text>
